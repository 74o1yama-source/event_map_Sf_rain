<script>
/* =========================================
   1. マップ初期化（構内ローカル座標）
========================================= */
const map = L.map("map", {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 2,
  zoomSnap: 0.1,
  zoomDelta: 0.2,
  zoomControl: false,   // ← ★これ追加
  dragging: !L.Browser.mobile,
  tap: false,
  scrollWheelZoom: false,
  doubleClickZoom: false,
  attributionControl: false
});

L.control.attribution({
  position: 'topright'
}).addTo(map);

L.control.zoom({
  position: 'bottomleft'
}).addTo(map);

if (L.Browser.mobile) {

  let startPoint = null;

  map.dragging.disable();

  map.on("touchstart", function (e) {
    const t = e.originalEvent.touches[0];
    startPoint = { x: t.clientX, y: t.clientY };
  });

  map.on("touchmove", function (e) {
    const t = e.originalEvent.touches[0];

    const dx = Math.abs(t.clientX - startPoint.x);
    const dy = Math.abs(t.clientY - startPoint.y);

    // ★一定以上動いたらドラッグON
    if (dx + dy > 10) {
      map.dragging.enable();
    }
  });

  map.on("touchend", function () {
    map.dragging.disable();
  });
}

function fixMapSize() {
  map.invalidateSize();
}

setTimeout(fixMapSize, 0);
setTimeout(fixMapSize, 300);
setTimeout(fixMapSize, 800);

window.addEventListener("orientationchange", () => {
  setTimeout(fixMapSize, 300);
});

const checkedSet = new Set();

function saveChecked() {
  localStorage.setItem(
    "checkedBooths",
    JSON.stringify([...checkedSet])
  );
}


function sortCheckedList() {
  const ul = document.getElementById("checked-items");
  const items = Array.from(ul.children);

  items.sort((a, b) => {
    const idA = parseInt(a.dataset.id, 10);
    const idB = parseInt(b.dataset.id, 10);
    return idA - idB;
  });

  items.forEach(li => ul.appendChild(li));
}

function addCheckedItem(p) {
  if (checkedSet.has(p.id)) return;

  checkedSet.add(p.id);
  saveChecked();   // ★追加

  const ul = document.getElementById("checked-items");
  if (!ul) return;

  const li = document.createElement("li");
  li.setAttribute("data-id", p.id);

  const text = document.createElement("span");
  text.textContent = `${p.id} ${p.name}`;

  const btn = document.createElement("button");
  btn.textContent = "解除";
  btn.className = "remove-btn";

  btn.addEventListener("click", () => {
    checkedSet.delete(p.id);
    li.remove();
    saveChecked();   // ★ここも重要
  });

  li.appendChild(text);
  li.appendChild(btn);
  ul.appendChild(li);
  sortCheckedList();
}

 // ✅ 一括解除処理
document.getElementById("clear-all-btn").addEventListener("click", () => {
  checkedSet.clear();

  const ul = document.getElementById("checked-items");
  while (ul.firstChild) {
    ul.removeChild(ul.firstChild);
  }

  saveChecked();   // ★追加
});


function loadChecked() {
  const data = localStorage.getItem("checkedBooths");
  if (!data) return;

  const ids = JSON.parse(data);

  ids.forEach(id => {
    // outdoorBooths から探す
    const booth = outdoorBooths.features.find(f => f.properties.id === id);
    if (booth) {
      addCheckedItem(booth.properties);
    }
  });
}


const btn = document.getElementById("toggle-instruction-btn");
const box = document.getElementById("map-instruction");

let timer = null;

btn.addEventListener("click", () => {

  // 手動閉じる
  if (box.style.display === "block" && box.style.opacity === "1") {
    fadeOut();
    return;
  }

  // 表示
  box.style.display = "block";

  setTimeout(() => {
    box.style.opacity = "1";
  }, 10);

  btn.textContent = "✖ 閉じる";

  if (timer) clearTimeout(timer);

  // ✅ 少し止めてからフェード開始（ここが自然さのコツ）
  timer = setTimeout(() => {
    fadeOut();
  }, 7000); // ←9秒後に開始 → 1秒かけて消える
});

// フェードアウト関数
function fadeOut() {
  box.style.opacity = "0";

  setTimeout(() => {
    box.style.display = "none";
    btn.textContent = "ℹ️ 操作説明";
  }, 600); // ←CSSと合わせる
}


// ==============================
// 🚫 歩行検知（進化版・安定型）
// ==============================

let isWalking = false;
let overlay = document.getElementById("walking-overlay");

// 履歴データ
let accelHistory = [];

// 設定値（チューニング可能）
const WINDOW_SIZE = 6;       // 平均用
const START_THRESHOLD = 15;  // 開始
const STOP_THRESHOLD  = 10;  // 停止
const MIN_CONTINUE = 4;      // 継続回数
const STOP_TIME = 1800;      // 停止判定

let moveCount = 0;
let lastMoveTime = 0;

// iPhone対応
if (typeof DeviceMotionEvent.requestPermission === "function") {
  document.body.addEventListener("click", async () => {
    try { await DeviceMotionEvent.requestPermission(); }
    catch(e){}
  }, { once: true });
}

// ==============================
// 加速度検知
// ==============================
window.addEventListener("devicemotion", (event) => {

  const acc = event.accelerationIncludingGravity;
  if (!acc) return;

  const total =
    Math.abs(acc.x || 0) +
    Math.abs(acc.y || 0) +
    Math.abs(acc.z || 0);

  // 履歴追加
  accelHistory.push(total);
  if (accelHistory.length > WINDOW_SIZE) {
    accelHistory.shift();
  }

  // 平均値算出
  const avg =
    accelHistory.reduce((a, b) => a + b, 0) /
    accelHistory.length;

  // ============================
  // ▶ 歩行開始判定（平均＋継続）
  // ============================
  if (avg > START_THRESHOLD) {
    moveCount++;
    lastMoveTime = Date.now();
  } else {
    moveCount = Math.max(0, moveCount - 1);
  }

  if (!isWalking && moveCount >= MIN_CONTINUE) {
    isWalking = true;

    overlay.style.display = "flex";
    setTimeout(() => overlay.style.opacity = "1", 10);

    console.log("🚶 歩行開始");
  }

  // ============================
  // ▶ 歩行中の更新
  // ============================
  if (isWalking && avg > STOP_THRESHOLD) {
    lastMoveTime = Date.now();
  }

});

// ==============================
// ▶ 停止判定
// ==============================
setInterval(() => {

  if (isWalking && (Date.now() - lastMoveTime > STOP_TIME)) {

    isWalking = false;

    overlay.style.opacity = "0";

    setTimeout(() => {
      overlay.style.display = "none";
    }, 300);

    console.log("🛑 停止");
  }

}, 300);

/* =========================================
   5. 描画処理
========================================= */

function popupBase(p) {
  let html = `
    <div style="
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
    ">
      ${p.id} ${p.name}
    </div>
【概要】：${p.detail}
  `;


  // 実演時間（あれば表示）
  if (p.time) {
    html += `
<div style="margin-top:4px;">
【実演時間】：${p.time}
</div>`;
  }

  // 画像がある場合のみ表示
  if (p.image) {
    html += `
      <img src="${p.image}"
           style="width:100%; margin-top:6px; border-radius:6px;">`;
  }

  return html;
}




function showBlinkMarkerById(id) {

  highlightLayer.clearLayers();

  outdoorBooths.features.forEach(function(f){

    if (String(f.properties.id) === String(id)) {

      const coord = f.geometry.coordinates;

      const marker = L.marker(
        [coord[1], coord[0]],
        {
          icon: L.divIcon({
            className: "",
            html: '<div class="blink-dot"></div>',
            iconSize: [0,0],
            iconAnchor: [12,8]
          })
        }
      );

      highlightLayer.addLayer(marker);

      // ★5秒後に消える
    setTimeout(() => {
      marker.remove();  // ← こっちの方が安定
    }, 5000);


    }

  });

}


// ★ 元の中心保存用（← 外に出す！！）
let originalCenter = null;
let originalZoom   = null;

L.geoJSON(outdoorBooths, {

  pointToLayer: (f, ll) =>
    L.marker(ll, {
      icon: L.divIcon({
        className: "star-marker",
        html: '<span style="font-size:30px; color:#000000; font-weight:bold;"> </span>',
        iconSize: [36, 36],
        iconAnchor: [18, 18]
      })
    }),

  onEachFeature: (f, l) => {

    l.on("click", () => {

      // ★ 現在位置保存
      originalCenter = map.getCenter();
      originalZoom   = map.getZoom();

      // ★ popup表示
      L.popup({
        autoPan: false
      })
        .setLatLng(l.getLatLng())
        .setContent(popupBase(f.properties))
        .openOn(map);

  // ★ 中央補正
         setTimeout(() => {

      const popupEl = document.querySelector(".leaflet-popup");
      if (!popupEl) return;

      const popupRect = popupEl.getBoundingClientRect();
      const mapRect   = map.getContainer().getBoundingClientRect();

      // ★ Y方向
      const popupCenterY = popupRect.top + popupRect.height / 2;
      const mapCenterY   = mapRect.top + mapRect.height / 2;
      const diffY = popupCenterY - mapCenterY;

      // ★ X方向（追加）
      const popupCenterX = popupRect.left + popupRect.width / 2;
      const mapCenterX   = mapRect.left + mapRect.width / 2;
      const diffX = popupCenterX - mapCenterX;

      // ★ 両方向移動
      map.panBy([diffX, diffY], { animate: true });
}, 50);

      // ★ 閉じたら戻す
      map.once("popupclose", () => {
        if (originalCenter) {
          map.flyTo(originalCenter, originalZoom, {
            animate: true,
            duration: 0.4
          });
        }
      });

    });

  }

}).addTo(outdoorLayer);


L.geoJSON(BoothsCheck, {
  pointToLayer: (f, ll) =>
    L.marker(ll, {
      icon: L.divIcon({
        className: "star-marker",
        html: `
<div style="
  background: transparent;
  width: 200px;
  height: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
">
  <span style="
    font-size:24px;
    color: transparent;
    font-weight:bold;
  ">
  </span>
</div>        `,
        iconSize: [40, 40],
        iconAnchor: [10, 10]
      }),  // ← ★ここ重要（カンマ追加）

      autoPanOnFocus: false,
      keyboard: false
    }),

onEachFeature: (f, l) => {

  if (!L.Browser.mobile) {

    // ✅ PC（そのまま）
    l.bindTooltip(`${f.properties.id} ${f.properties.name}`, {
      direction: "right",
      opacity: 0.9
    });

    l.on("click", () => {
      showBlinkMarkerById(f.properties.id);
      addCheckedItem(f.properties);
    });

  } else {

    // ✅ スマホ（popup方式）

    l.on("click", () => {
      showBlinkMarkerById(f.properties.id);
      const popupContent = `
        <div style="font-size:14px;">
          <b>${f.properties.id} ${f.properties.name}</b><br>
          <button id="addBtn-${f.properties.id}"
            style="
              margin-top:6px;
              padding:6px 10px;
              background:#1d6fdc;
              color:#fff;
              border:none;
              border-radius:4px;
            "
          >
            チェック追加
          </button>
        </div>
      `;

      const popup = L.popup({
        autoPan: true
      })
        .setLatLng(l.getLatLng())
        .setContent(popupContent)
        .openOn(map);

      // ✅ ボタン確実に拾う
      setTimeout(() => {
        const btn = document.getElementById(`addBtn-${f.properties.id}`);
        if (btn) {
          btn.addEventListener("click", () => {
            showBlinkMarkerById(f.properties.id);
            addCheckedItem(f.properties);
            map.closePopup(); // 閉じる
          });
        }
      }, 0);

    });

  }
}
}).addTo(indoorLayer);
